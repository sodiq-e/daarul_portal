{% extends "base.html" %}
{% block content %}
  <section class="hero">
    <h1>WELCOME TO DAARUL BAYAN</h1>
    <p>Login to access your class dashboard, student data, results, attendance, and school management tools.</p>
    <div class="card" style="background:white;color:#202040;padding:28px;border-radius:18px;max-width:520px;box-shadow:0 20px 50px rgba(35,31,89,.12);margin-top:24px">
      <h2 style="margin-top:0;color:#4b2e83">Sign In</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background:#4b2e83;color:white;border:none;padding:12px 22px;border-radius:999px;font-weight:700;cursor:pointer">Login</button>
      </form>
    </div>
  </section>
{% endblock %}
