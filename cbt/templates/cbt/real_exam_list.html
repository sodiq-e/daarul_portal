{% extends 'base.html' %}
{% block content %}
<h1>Real Exams</h1>
<ul>
  {% for exam in real_exams %}
  <li>
    <strong>{{ exam.title }}</strong> — {{ exam.duration_minutes }} minutes
    <a href="{% url 'cbt:real_exam_detail' exam.pk %}">View details</a>
  </li>
  {% empty %}
  <li>No real exams scheduled.</li>
  {% endfor %}
</ul>
{% endblock %}
