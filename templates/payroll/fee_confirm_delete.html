{% extends 'base.html' %}

{% block title %}Delete School Fee{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Confirm Delete</h4>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete the following fee type?</p>
                    <div class="alert alert-warning">
                        <strong>{{ fee.name }}</strong> - ₦{{ fee.amount|floatformat:2 }}
                    </div>
                    <p class="text-muted">This action cannot be undone.</p>
                </div>
                <div class="card-footer">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'fee_list' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
