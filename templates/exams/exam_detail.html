{% extends 'base.html' %}

{% block title %}{{ exam.name }} - Details{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>{{ exam.name }}</h1>
        <div>
            {% if can_modify %}
            <a href="{% url 'exam_edit' exam.pk %}" class="btn btn-warning">Edit</a>
            <a href="{% url 'exam_delete' exam.pk %}" class="btn btn-danger">Delete</a>
            {% endif %}
            <a href="{% url 'exam_list' %}" class="btn btn-secondary">Back to List</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <p><strong>Name:</strong> {{ exam.name }}</p>
            <p><strong>Date:</strong> {{ exam.date|date:"F j, Y" }}</p>
        </div>
    </div>
</div>
{% endblock %}
